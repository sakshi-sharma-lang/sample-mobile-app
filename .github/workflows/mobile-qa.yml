name: Mobile APK QA

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  appium-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # Core Paths - Fixed: Only one definition, correctly indented
      APP_PATH: app/app.apk
      
      # APK Download Config
      APK_URL: ${{ vars.APK_URL || secrets.APK_URL || '' }}
      APK_RELEASE_TAG: ${{ vars.APK_RELEASE_TAG || 'v1.0.0' }}
      APK_ASSET_NAME: ${{ vars.APK_ASSET_NAME || 'Android_Appium_Demo.apk' }}
      
      # Test Config
      PYTEST_MARKERS: ${{ vars.PYTEST_MARKERS || 'smoke' }}
      ANDROID_API_LEVEL: ${{ vars.ANDROID_API_LEVEL || '30' }}
      
      # Jira Configuration
      JIRA_URL: ${{ secrets.JIRA_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY || 'QA' }}
      
      # Feature Toggles
      ENABLE_JIRA: "true"
      ENABLE_CREATE_PR: "true"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install -g appium
          appium driver install uiautomator2

      - name: Resolve APK from GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p app
          echo "Searching for APK in GitHub Releases..."
          
          # Fetch release info using GitHub CLI
          latest_release="$(gh release view --repo ${{ github.repository }} --json tagName,assets)"
          TAG=$(echo "$latest_release" | python3 -c "import json,sys; data=json.load(sys.stdin); print(data['tagName'])")
          ASSET=$(echo "$latest_release" | python3 -c "import json,sys; data=json.load(sys.stdin); assets=data['assets']; print(next((asset['name'] for asset in assets if asset['name'].lower().endswith('.apk')), ''))")
          
          if [ -z "$TAG" ] || [ -z "$ASSET" ]; then
            echo "::error::No APK found in GitHub Releases. Ensure you have a release with an .apk file."
            exit 1
          fi
          
          echo "Downloading $ASSET from release $TAG..."
          gh release download "$TAG" --repo ${{ github.repository }} --pattern "$ASSET" --output "$APP_PATH" --clobber
          
          if [ ! -s "$APP_PATH" ]; then
            echo "::error::Download failed or file is empty."
            exit 1
          fi

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Appium server
        run: |
          mkdir -p reports
          nohup appium --base-path / > reports/appium.log 2>&1 &
          
          # Health check for Appium
          for i in {1..10}; do
            if curl -s http://127.0.0.1:4723/status; then
              echo "Appium is up!"
              break
            fi
            echo "Waiting for Appium..."
            sleep 2
          done

      - name: Run Pytest on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: pytest

      - name: Create PR on Success
        if: success() && github.ref != 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --title "QA Passed: ${{ github.sha }}" --body "Mobile automation tests passed for build ${{ github.run_number }}." --base main --head ${{ github.ref_name }}

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-qa-reports-${{ github.run_number }}
          path: |
            reports/
            allure-results/
