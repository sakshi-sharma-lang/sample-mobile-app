name: Mobile QA Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - qa-test-branch
      - feature/*
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install -g appium
          appium driver install uiautomator2

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      # ✅ APK download (same as before)
      - name: Download APK
        run: |
          APK_URL=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases \
            | grep "browser_download_url.*apk" \
            | head -n 1 \
            | cut -d '"' -f 4)

          curl -L -o app.apk "$APK_URL"

      - name: Validate APK
        run: |
          file app.apk
          unzip -t app.apk > /dev/null 2>&1 || exit 1

      # 🔥 FIXED EMULATOR SETUP
      - name: Run Mobile Tests
        id: test
        uses: reactivecircus/android-emulator-runner@v2
        continue-on-error: true
        with:
          api-level: 30
          target: google_apis   # 🔥 IMPORTANT
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          emulator-boot-timeout: 600   # 🔥 IMPORTANT (10 mins)
          script: |
            echo "Waiting for emulator..."
            adb wait-for-device

            echo "Checking devices"
            adb devices

            echo "Installing APK"
            adb install app.apk || exit 1

            echo "Starting Appium"
            appium &
            sleep 15

            echo "Running pytest"
            pytest

      - name: Check pytest result
        id: pytest_check
        run: |
          if [ "${{ steps.test.outcome }}" == "failure" ]; then
            echo "pytest_failed=true" >> $GITHUB_OUTPUT
          else
            echo "pytest_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Jira Ticket
        if: steps.pytest_check.outputs.pytest_failed == 'true'
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_ISSUE_TYPE: ${{ vars.JIRA_ISSUE_TYPE }}
        run: |
          curl -X POST \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{
              \"fields\": {
                \"project\": { \"key\": \"$JIRA_PROJECT_KEY\" },
                \"summary\": \"Mobile Test Failure\",
                \"description\": {
                  \"type\": \"doc\",
                  \"version\": 1,
                  \"content\": [{
                    \"type\": \"paragraph\",
                    \"content\": [{
                      \"type\": \"text\",
                      \"text\": \"Pytest test cases failed in CI pipeline\"
                    }]
                  }]
                },
                \"issuetype\": { \"name\": \"$JIRA_ISSUE_TYPE\" }
              }
            }" \
            "$JIRA_BASE_URL/rest/api/3/issue"

      - name: Create Pull Request
        if: steps.pytest_check.outputs.pytest_failed == 'false' && github.ref_name != 'main'
        run: |
          curl -X POST https://api.github.com/repos/${{ github.repository }}/pulls \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "title": "Auto PR after mobile tests passed",
              "head": "${{ github.ref_name }}",
              "base": "main"
            }'