name: Mobile APK QA

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  appium-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      APP_PATH: app/app.apk
      # Jira Configuration
      JIRA_URL: ${{ secrets.JIRA_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY || 'QA' }}
      # Feature Toggles
      ENABLE_JIRA: "true"
      ENABLE_CREATE_PR: "true"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install -g appium
          appium driver install uiautomator2

      - name: Resolve APK from GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p app
          echo "Searching for APK in GitHub Releases (including pre-releases)..."
          
          # Added the --exclude-drafts flag but removed requirement for stable
          # This command fetches the most recent release regardless of 'Pre-release' status
          latest_release="$(gh release list --limit 1 --exclude-drafts --json tagName | jq -r '.[0].tagName')"
          
          if [ "$latest_release" == "null" ] || [ -z "$latest_release" ]; then
            echo "::error::No release found. Ensure you have at least one non-draft release."
            exit 1
          fi

          echo "Found Release: $latest_release. Fetching assets..."
          
          # Fetch all assets for that tag
          assets_json="$(gh release view "$latest_release" --json assets)"
          
          # Use Python to find the first asset ending in .apk
          ASSET_NAME=$(echo "$assets_json" | python3 -c "import json,sys; data=json.load(sys.stdin); print(next((a['name'] for a in data['assets'] if a['name'].lower().endswith('.apk')), ''))")

          if [ -z "$ASSET_NAME" ]; then
            echo "::error::No .apk asset found in release $latest_release."
            exit 1
          fi
          
          echo "Downloading $ASSET_NAME from $latest_release..."
          gh release download "$latest_release" --pattern "$ASSET_NAME" --output "$APP_PATH" --clobber
          
          if [ ! -s "$APP_PATH" ]; then
            echo "::error::Download failed or file is empty."
            exit 1
          fi

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Appium server
        run: |
          mkdir -p reports
          nohup appium --base-path / > reports/appium.log 2>&1 &
          
          for i in {1..10}; do
            if curl -s http://127.0.0.1:4723/status; then
              echo "Appium is up!"
              break
            fi
            echo "Waiting for Appium..."
            sleep 2
          done

      - name: Run Pytest on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: pytest

      - name: Create PR on Success
        if: success() && github.ref != 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          gh pr create --title "QA Passed: ${{ github.sha }}" --body "Mobile automation tests passed for build ${{ github.run_number }}." --base main --head ${{ github.ref_name }}

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-qa-reports-${{ github.run_number }}
          path: |
            reports/
            allure-results/
