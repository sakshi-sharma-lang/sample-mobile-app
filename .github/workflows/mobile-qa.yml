name: Mobile APK QA

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  appium-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # Core Paths
      APP_PATH: app/app.apk
      # Jira Configuration - Mapping Secrets to Env Vars
      JIRA_URL: ${{ secrets.JIRA_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY || 'QA' }}
      # Feature Toggles
      ENABLE_JIRA: "true"
      ENABLE_CREATE_PR: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install -g appium
          appium driver install uiautomator2

      - name: Resolve APK
        run: |
          mkdir -p app
          # Find any apk in the app folder and rename it to app.apk for the automation
          APK_FILE=$(find app -name "*.apk" | head -n 1)
          if [ -n "$APK_FILE" ]; then
            echo "Found APK: $APK_FILE, moving to $APP_PATH"
            cp "$APK_FILE" "$APP_PATH"
          else
            echo "::error::No APK found in the 'app/' directory. Ensure your APK is committed to the repo."
            exit 1
          fi

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Appium server
        run: |
          mkdir -p reports
          nohup appium --base-path / > reports/appium.log 2>&1 &
          sleep 5

      - name: Run Pytest on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: pytest

      - name: Create PR on Success
        if: success() && github.ref != 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          gh pr create --title "QA Passed: ${{ github.sha }}" --body "Mobile automation tests passed for this build." --base main --head ${{ github.ref_name }}

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-qa-reports
          path: |
            reports/
            /tmp/emulator.log
