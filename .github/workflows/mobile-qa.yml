name: Mobile APK QA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  appium-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      APP_PATH: app/app.apk
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
      JIRA_ISSUE_TYPE: ${{ vars.JIRA_ISSUE_TYPE }}
      ENABLE_JIRA: ${{ vars.ENABLE_JIRA }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          npm install -g appium
          appium driver install uiautomator2

      - name: Resolve APK
        run: |
          mkdir -p app
          latest_release="$(gh release list --limit 1 --json tagName | jq -r '.[0].tagName')"
          gh release download "$latest_release" --pattern "*.apk" --output "$APP_PATH" --clobber

      - name: Start Appium
        run: |
          mkdir -p reports
          nohup appium --base-path / > reports/appium.log 2>&1 &
          sleep 10

      - name: Run Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: Nexus 5
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot-save -noaudio -no-boot-anim -camera-back none -memory 2048
          disable-animations: true
          script: pytest

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-qa-reports
          path: reports/