name: Mobile APK QA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  appium-emulator:
    runs-on: ubuntu-latest
    env:
      APP_PATH: app/app.apk
      # From the SECRETS tab
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      # From the VARIABLES tab
      JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
      JIRA_ISSUE_TYPE: ${{ vars.JIRA_ISSUE_TYPE }}
      ENABLE_JIRA: ${{ vars.ENABLE_JIRA }}
      ENABLE_CREATE_PR: ${{ vars.ENABLE_CREATE_PR }}
      GH_TOKEN: ${{ secrets.TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          npm install -g appium
          appium driver install uiautomator2

      - name: Resolve APK from GitHub Release
        run: |
          mkdir -p app
          # Fetches the latest release APK automatically
          latest_release="$(gh release list --limit 1 --json tagName | jq -r '.[0].tagName')"
          gh release download "$latest_release" --pattern "*.apk" --output "$APP_PATH" --clobber

      - name: Start Appium
        run: |
          nohup appium --base-path / > appium.log 2>&1 &
          sleep 10

      - name: Run Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: pytest

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/
