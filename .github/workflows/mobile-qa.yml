name: QA Pipeline (Correct Jira Logic)

on:
  workflow_dispatch:
  push:
    branches:
      - qa-test-branch
      - feature/*

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # ✅ install required plugins
      - name: Install dependencies
        run: |
          pip install pytest pytest-html pytest-rerunfailures requests

      # 🔥 Run pytest and capture exit code
      - name: Run pytest
        id: test
        continue-on-error: true
        run: |
          pytest
          echo "PYTEST_EXIT_CODE=$?" >> $GITHUB_ENV

      # 🎯 Evaluate correctly
      - name: Evaluate Result
        id: result
        run: |
          echo "Exit code: $PYTEST_EXIT_CODE"

          if [ "$PYTEST_EXIT_CODE" -eq 1 ]; then
            echo "test_failed=true" >> $GITHUB_OUTPUT
          else
            echo "test_failed=false" >> $GITHUB_OUTPUT
          fi

      # ❌ Jira ONLY for REAL test failures
      - name: Create Jira Ticket
        if: steps.result.outputs.test_failed == 'true'
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_ISSUE_TYPE: ${{ vars.JIRA_ISSUE_TYPE }}
        run: |
          echo "Creating Jira ticket (test failure only)..."

          curl -X POST \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{
              \"fields\": {
                \"project\": { \"key\": \"$JIRA_PROJECT_KEY\" },
                \"summary\": \"Test Failure\",
                \"description\": {
                  \"type\": \"doc\",
                  \"version\": 1,
                  \"content\": [{
                    \"type\": \"paragraph\",
                    \"content\": [{
                      \"type\": \"text\",
                      \"text\": \"Test cases failed (assertion failure)\"
                    }]
                  }]
                },
                \"issuetype\": { \"name\": \"$JIRA_ISSUE_TYPE\" }
              }
            }" \
            "$JIRA_BASE_URL/rest/api/3/issue"

      # ✅ PR ONLY if ALL tests pass
      - name: Create Pull Request
        if: steps.result.outputs.test_failed == 'false'
        run: |
          echo "Creating PR..."

          curl -X POST https://api.github.com/repos/${{ github.repository }}/pulls \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "title": "Auto PR after tests passed",
              "head": "${{ github.ref_name }}",
              "base": "main"
            }'