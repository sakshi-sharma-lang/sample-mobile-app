name: Mobile APK QA

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  appium-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      APP_PATH: app/app.apk
      # Use these to target a specific release, or leave blank to auto-find the latest
      APK_RELEASE_TAG: "" 
      APK_ASSET_NAME: ""
      
      # Jira Configuration
      JIRA_URL: ${{ secrets.JIRA_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY || 'QA' }}
      
      # Feature Toggles
      ENABLE_JIRA: "true"
      ENABLE_CREATE_PR: "true"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install -g appium
          appium driver install uiautomator2

      - name: Resolve APK from GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p app
          echo "Searching for APK in GitHub Releases..."
          
          # Logic to find the latest release tag and the first .apk asset
          latest_release="$(gh release view --repo ${{ github.repository }} --json tagName,assets)"
          TAG=$(echo "$latest_release" | python3 -c "import json,sys; print(json.load(sys.stdin)['tagName'])")
          ASSET=$(echo "$latest_release" | python3 -c "import json,sys; assets=json.load(sys.stdin)['assets']; print(next((asset['name'] for asset in assets if asset['name'].lower().endswith('.apk')), ''))")
          
          if [ -z "$TAG" ] || [ -z "$ASSET" ]; then
            echo "::error::No APK found in GitHub Releases. Ensure you have a release with an .apk file."
            exit 1
          fi
          
          echo "Downloading $ASSET from release $TAG..."
          gh release download "$TAG" --repo ${{ github.repository }} --pattern "$ASSET" --output "$APP_PATH" --clobber
          
          if [ ! -s "$APP_PATH" ]; then
            echo "::error::Download failed or file is empty."
            exit 1
          fi

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Appium server
        run: |
          mkdir -p reports
          nohup appium --base-path / > reports/appium.log 2>&1 &
          sleep 5

      - name: Run Pytest on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: pytest

      - name: Create PR on Success
        if: success() && github.ref != 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --title "QA Passed: ${{ github.sha }}" --body "Mobile automation tests passed for this build." --base main --head ${{ github.ref_name }}

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-qa-reports
          path: |
            reports/
            allure-results/
