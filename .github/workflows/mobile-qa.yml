name: QA Pipeline (Simple)

on:
  workflow_dispatch:
  push:
    branches:
      - qa-test-branch
      - feature/*

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - uses: actions/checkout@v4

      # 🐍 Python
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 📦 Install deps
      - name: Install dependencies
        run: pip install pytest

      # 🧪 Run tests
      - name: Run pytest
        id: test
        run: |
          pytest
        continue-on-error: true

      # 🎯 Detect result
      - name: Evaluate Result
        id: result
        run: |
          if [ "${{ steps.test.outcome }}" == "failure" ]; then
            echo "failed=true" >> $GITHUB_OUTPUT
          else
            echo "failed=false" >> $GITHUB_OUTPUT
          fi

      # ❌ Jira on failure
      - name: Create Jira Ticket
        if: steps.result.outputs.failed == 'true'
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_ISSUE_TYPE: ${{ vars.JIRA_ISSUE_TYPE }}
        run: |
          echo "Creating Jira ticket..."

          curl -X POST \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{
              \"fields\": {
                \"project\": { \"key\": \"$JIRA_PROJECT_KEY\" },
                \"summary\": \"Test Failure\",
                \"description\": {
                  \"type\": \"doc\",
                  \"version\": 1,
                  \"content\": [{
                    \"type\": \"paragraph\",
                    \"content\": [{
                      \"type\": \"text\",
                      \"text\": \"Pytest failed in CI pipeline\"
                    }]
                  }]
                },
                \"issuetype\": { \"name\": \"$JIRA_ISSUE_TYPE\" }
              }
            }" \
            "$JIRA_BASE_URL/rest/api/3/issue"

      # ✅ PR on success
      - name: Create Pull Request
        if: steps.result.outputs.failed == 'false'
        run: |
          echo "Creating PR..."

          curl -X POST https://api.github.com/repos/${{ github.repository }}/pulls \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "title": "Auto PR after tests passed",
              "head": "${{ github.ref_name }}",
              "base": "main"
            }'