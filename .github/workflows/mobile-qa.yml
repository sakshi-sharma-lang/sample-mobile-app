name: QA Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install pytest requests

      - name: Run tests
        id: test
        run: pytest
        continue-on-error: true

      - name: Set test result
        id: result
        run: |
          if [ "${{ steps.test.outcome }}" == "failure" ]; then
            echo "failed=true" >> $GITHUB_OUTPUT
          else
            echo "failed=false" >> $GITHUB_OUTPUT
          fi

      # ❌ Create Jira Ticket
      - name: Create Jira Ticket
        if: steps.result.outputs.failed == 'true'
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}   # ✅ FIXED
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        run: |
          echo "Creating Jira ticket..."

          curl -X POST \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{
              \"fields\": {
                \"project\": { \"key\": \"$JIRA_PROJECT_KEY\" },
                \"summary\": \"QA Automation Failure\",
                \"description\": \"Tests failed in CI pipeline\",
                \"issuetype\": { \"name\": \"Bug\" }
              }
            }" \
            "$JIRA_BASE_URL/rest/api/3/issue"

      # ✅ Create PR
      - name: Create Pull Request
        if: steps.result.outputs.failed == 'false'
        run: |
          echo "Creating PR from ${{ github.ref_name }} to main"

          curl -X POST https://api.github.com/repos/${{ github.repository }}/pulls \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{
              "title": "Auto PR after successful tests",
              "head": "${{ github.ref_name }}",
              "base": "main",
              "body": "All tests passed successfully"
            }'