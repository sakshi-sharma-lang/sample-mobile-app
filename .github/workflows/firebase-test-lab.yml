name: Firebase Test Lab APK QA

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: "Optional HTTPS URL for the APK under test. If empty, app/app-under-test.apk is used."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  firebase-robo:
    name: Firebase Test Lab Robo test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      APP_PATH: app/app-under-test.apk
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      FIREBASE_DEVICE_MODEL: ${{ vars.FIREBASE_DEVICE_MODEL || 'Pixel2' }}
      FIREBASE_DEVICE_VERSION: ${{ vars.FIREBASE_DEVICE_VERSION || '30' }}
      FIREBASE_DEVICE_LOCALE: ${{ vars.FIREBASE_DEVICE_LOCALE || 'en' }}
      FIREBASE_DEVICE_ORIENTATION: ${{ vars.FIREBASE_DEVICE_ORIENTATION || 'portrait' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Resolve APK
        run: |
          mkdir -p app
          if [ -n "${{ inputs.apk_url }}" ]; then
            curl --fail --location --retry 3 --output "$APP_PATH" "${{ inputs.apk_url }}"
          fi
          test -f "$APP_PATH"

      - name: Run Firebase Test Lab Robo test
        run: python scripts/run_firebase_test_lab.py

      - name: Upload Firebase result metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-test-lab-${{ github.run_id }}
          path: firebase-results/
          if-no-files-found: ignore
